<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lab Equipment Hub — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --surface2: #1a2236;
      --border: rgba(99,179,237,0.15);
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --muted: #64748b;
      --danger: #ef4444;
      --success: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .orb1 { width: 400px; height: 400px; background: rgba(59,130,246,0.12); top: -100px; right: -100px; }
    .orb2 { width: 300px; height: 300px; background: rgba(6,182,212,0.08); bottom: -80px; left: -80px; }

    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 24px;
      box-shadow: 0 0 40px rgba(59,130,246,0.3);
    }

    .logo-title {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #60a5fa, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .card-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-family: 'Space Mono', monospace;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      margin-top: 8px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(59,130,246,0.4);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-top: 14px;
      display: none;
    }

    .error-msg.show { display: block; }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .kuet-badge {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="login-wrap">
    <div class="logo-area">
      <div class="logo-icon">🔬</div>
      <div class="logo-title">LabEquipmentHub</div>
      <div class="logo-sub">KUET — Equipment Management</div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('user')">Student / Staff</button>
        <button class="tab" onclick="switchTab('admin')">Admin</button>
      </div>

      <div id="tab-user">
        <div class="card-title">Welcome back</div>
        <div class="card-sub">Sign in to access the lab equipment portal</div>

        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="user-email" placeholder="your@student.kuet.ac.bd" />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="user-pass" placeholder="••••••••" />
        </div>

        <button class="btn btn-primary" id="login-btn" onclick="loginUser()">Sign In</button>
        <div class="error-msg" id="user-error"></div>
      </div>

      <div id="tab-admin" style="display:none;">
        <div class="card-title">Admin Access</div>
        <div class="card-sub">Restricted to authorized lab administrators</div>

        <div class="input-group">
          <label>Admin Email</label>
          <input type="email" id="admin-email" placeholder="admin@kuet.ac.bd" />
        </div>
        <div class="input-group">
          <label>Admin Password</label>
          <input type="password" id="admin-pass" placeholder="••••••••" />
        </div>

        <button class="btn btn-primary" id="admin-btn" onclick="loginAdmin()">Admin Sign In</button>
        <div class="error-msg" id="admin-error"></div>
      </div>
    </div>

    <div class="kuet-badge">KUET · EEE Dept · Lab Management System</div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
   
    const API_URL = "http://localhost:5000/api";

    window.switchTab = (tab) => {
      document.getElementById('tab-user').style.display = tab === 'user' ? 'block' : 'none';
      document.getElementById('tab-admin').style.display = tab === 'admin' ? 'block' : 'none';
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tab==='user'&&i===0)||(tab==='admin'&&i===1)));
    };

    window.loginUser = async () => {

  const email =
    document.getElementById("user-email")
      .value.trim();

  const password =
    document.getElementById("user-pass")
      .value;

  const btn =
    document.getElementById("login-btn");

  const err =
    document.getElementById("user-error");

  err.classList.remove("show");

  if (!email || !password) {

    showError(
      err,
      "Please fill in all fields."
    );

    return;
  }

  btn.disabled = true;

  btn.innerHTML =
    '<span class="spinner"></span> Signing in...';

  try {

    const response =
      await fetch(
        `${API_URL}/auth/login`,
        {
          method: "POST",
          headers: {
            "Content-Type":
              "application/json"
          },
          body: JSON.stringify({
            email,
            password
          })
        }
      );

    const data =
      await response.json();

    if (!data.success) {

      throw new Error(
        data.message ||
        "Login failed"
      );
    }

    localStorage.setItem(
      "token",
      data.token
    );

    localStorage.setItem(
      "user",
      JSON.stringify(data.user)
    );

    if (
      data.user.role === "admin"
    ) {

      window.location.href =
        "admin.html";

    } else {

      window.location.href =
        "dashboard.html";
    }

  } catch (e) {

    showError(
      err,
      e.message
    );

    btn.disabled = false;

    btn.textContent =
      "Sign In";
  }
};

    window.loginAdmin = async () => {

  const email =
    document.getElementById("admin-email")
      .value.trim();

  const password =
    document.getElementById("admin-pass")
      .value;

  const btn =
    document.getElementById("admin-btn");

  const err =
    document.getElementById("admin-error");

  err.classList.remove("show");

  if (!email || !password) {

    showError(
      err,
      "Please fill in all fields."
    );

    return;
  }

  btn.disabled = true;

  btn.innerHTML =
    '<span class="spinner"></span> Verifying...';

  try {

    const response =
      await fetch(
        `${API_URL}/auth/login`,
        {
          method: "POST",
          headers: {
            "Content-Type":
              "application/json"
          },
          body: JSON.stringify({
            email,
            password
          })
        }
      );

    const data =
      await response.json();

    if (!data.success) {

      throw new Error(
        data.message ||
        "Login failed"
      );
    }

    if (
      data.user.role !== "admin"
    ) {

      throw new Error(
        "Not an administrator"
      );
    }

    localStorage.setItem(
      "token",
      data.token
    );

    localStorage.setItem(
      "user",
      JSON.stringify(data.user)
    );

    window.location.href =
      "admin.html";

  } catch (e) {

    showError(
      err,
      e.message
    );

    btn.disabled = false;

    btn.textContent =
      "Admin Sign In";
  }
};

    function showError(el, msg) {
      el.textContent = msg;
      el.classList.add('show');
    }

    function getFirebaseError(code) {
      const map = {
        'auth/invalid-email': 'Invalid email address.',
        'auth/user-not-found': 'No account found with this email.',
        'auth/wrong-password': 'Incorrect password.',
        'auth/too-many-requests': 'Too many attempts. Please try again later.',
        'auth/invalid-credential': 'Invalid email or password.',
      };
      return map[code] || 'Login failed. Please try again.';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const adminVisible = document.getElementById('tab-admin').style.display !== 'none';
        if (adminVisible) loginAdmin(); else loginUser();
      }
    });
    
  </script>
</body>
</html>
